services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      GATEWAY_HOST: 0.0.0.0
      GATEWAY_PORT: 8080
      LOG_LEVEL: info
      DATABASE_URL: postgres://nexus:nexus@db:5432/nexus_mcp?sslmode=disable
      REDIS_URL: redis://cache:6379
      JWT_ISSUER: nexus-mcp
      JWT_AUDIENCE: nexus-mcp-clients
      JWT_ACCESS_TTL_MINUTES: 15
      JWT_REFRESH_TTL_HOURS: 168
      JWT_SECRET: dev-secret-change-me-please-min-32-chars
      APPROVAL_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      cache:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    environment:
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000"]
      interval: 10s
      timeout: 3s
      retries: 6
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nexus_mcp
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_mcp"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  cache:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  reverse-proxy:
    image: nginx:1.27-alpine
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
      frontend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  db_data:
  redis_data:
